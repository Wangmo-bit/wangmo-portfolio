<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交互稿预览 — 桌面 + 手机</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    font-family: -apple-system, 'Noto Sans SC', sans-serif;
    color: #ccc;
    min-height: 100vh;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  h1 {
    font-size: 16px;
    font-weight: 500;
    color: #00F0FF;
    letter-spacing: 2px;
  }

  .preview-container {
    display: flex;
    gap: 32px;
    align-items: flex-start;
    justify-content: center;
    width: 100%;
    max-width: 1600px;
  }

  .device {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .device-label {
    font-size: 12px;
    color: #666;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Desktop frame */
  .desktop-frame {
    width: 1100px;
    height: 720px;
    border-radius: 12px;
    border: 2px solid #2a2a3e;
    overflow: hidden;
    position: relative;
    background: #000;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .desktop-frame::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 28px;
    background: #1a1a2a;
    border-bottom: 1px solid #2a2a3e;
    z-index: 10;
  }

  .desktop-frame::after {
    content: '● ● ●';
    position: absolute;
    top: 6px;
    left: 12px;
    font-size: 10px;
    color: #444;
    letter-spacing: 4px;
    z-index: 11;
  }

  .desktop-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    padding-top: 28px;
  }

  /* Phone frame */
  .phone-frame {
    width: 375px;
    height: 812px;
    border-radius: 40px;
    border: 3px solid #2a2a3e;
    overflow: hidden;
    position: relative;
    background: #000;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  /* Dynamic island */
  .phone-frame::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 32px;
    background: #111;
    border-radius: 20px;
    z-index: 10;
  }

  .phone-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .hint {
    font-size: 11px;
    color: #555;
    text-align: center;
    max-width: 600px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<h1>王墨的赛博分身 — 交互稿双端预览</h1>

<div class="preview-container">
  <div class="device">
    <div class="device-label">Desktop · 1100 × 720</div>
    <div class="desktop-frame">
      <iframe src="mockup.html"></iframe>
    </div>
  </div>

  <div class="device">
    <div class="device-label">iPhone 14 Pro · 375 × 812</div>
    <div class="phone-frame">
      <iframe src="mockup.html"></iframe>
    </div>
  </div>
</div>

<div class="hint">
  两端均可独立滚动和交互。桌面端滚动右栏可看到左栏背景色联动；手机端为上下布局，简化了背景联动效果。
</div>

</body>
</html>
